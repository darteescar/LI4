openapi: 3.0.3
info:
  title: EcoRide API
  description: |
    API REST do sistema EcoRide — gestão de uma oficina de reparação de trotinetes eléctricas.

    **Autenticação:** todas as rotas `/api/*` exigem o header `Authorization: <token>` obtido em `POST /auth/login`.
    Em DEV_MODE (variável de ambiente `DEV_MODE=true`) a autenticação é desligada e é injectada uma sessão de Gerente.

    **Controlo de acesso:** cada operação indica os cargos autorizados.
    Cargos disponíveis: `Gerente`, `GestorStock`, `Secretaria`, `Mecanico`.
  version: 1.0.0

servers:
  - url: http://localhost:7000
    description: Backend Javalin (directo)
  - url: http://localhost:3000
    description: Via nginx do frontend (proxy para /api/*)

tags:
  - name: Auth
    description: Autenticação e sessão
  - name: Utilizadores
    description: Gestão de utilizadores do sistema
  - name: Funcionários
    description: Gestão de funcionários
  - name: Clientes
    description: Gestão de clientes
  - name: Trotinetes
    description: Gestão de trotinetes dos clientes
  - name: Ordens de Serviço
    description: Ciclo de vida das ordens de serviço
  - name: Reparações
    description: Catálogo de reparações disponíveis
  - name: Stock
    description: Entradas de stock em armazém
  - name: Peças
    description: Catálogo de peças
  - name: Fornecedores
    description: Gestão de fornecedores
  - name: Encomendas
    description: Encomendas a fornecedores
  - name: Defeitos
    description: Registo de defeitos em stock
  - name: Devoluções
    description: Devoluções de stock ao fornecedor
  - name: Notificações
    description: Notificações internas entre utilizadores
  - name: Financeiro
    description: Movimentos financeiros e análise

# ─────────────────────────────────────────────────────────────────────────────
# Schemas
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization

  schemas:

    # ── Enums ──────────────────────────────────────────────────────────────────
    Cargo:
      type: string
      enum: [Gerente, GestorStock, Secretaria, Mecanico]

    EstadoOS:
      type: string
      enum:
        - PendenteDiagnostico
        - PendenteAprovacaoOrcamento
        - OrcamentoNaoAprovado
        - PendenteReparacao
        - AguardarPecas
        - ClienteNotificado
        - PendentePagamento
        - Paga
        - Eliminada

    EstadoStock:
      type: string
      enum:
        - StockEncomendado
        - StockEmArmazem
        - StockComPossivelDefeito
        - StockPendenteDeDevolucao
        - StockEnviadoParaFornecedor
        - StockDevolvidoFornecedor
        - StockinvalidoParaDevolucao
        - StockUsadoConserto

    EstadoEncomenda:
      type: string
      enum: [RASCUNHO, ENVIADA, RECEBIDA]

    EstadoDevolucao:
      type: string
      enum: [StockPendenteDeDevolucao, Enviada, Devolvida, Invalida]

    EstadoNotificacao:
      type: string
      enum: [NAOLIDA, LIDA, TRATADA]

    TipoMovimento:
      type: string
      enum: [Salario, GastoPecas, LucroMaoObra, LucroVendaPecas]

    MetodoPagamento:
      type: string
      enum: [NUMERARIO, MULTIBANCO, MBWAY]

    # ── Domain objects ─────────────────────────────────────────────────────────
    Utilizador:
      type: object
      properties:
        id:          { type: integer }
        identificador: { type: string }
        cargo:       { $ref: '#/components/schemas/Cargo' }
        idFuncionario: { type: integer }

    Cliente:
      type: object
      properties:
        id:            { type: integer }
        nome:          { type: string }
        email:         { type: string }
        telemovel:     { type: string }
        NIF:           { type: string }
        codsTrotinetes:
          type: array
          items: { type: integer }

    Trotinete:
      type: object
      properties:
        id:          { type: integer }
        modelo:      { type: string }
        marca:       { type: string }
        num_serie:   { type: string }
        tipo_motor:  { type: string }
        cod_cliente: { type: integer }
        codsOrdensServico:
          type: array
          items: { type: integer }

    Funcionario:
      type: object
      properties:
        id:             { type: integer }
        nome:           { type: string }
        telemovel:      { type: string }
        email:          { type: string }
        data_nascimento: { type: string, format: date }
        NISS:           { type: string }
        NIF:            { type: string }
        NUS:            { type: string }
        IBAN:           { type: string }
        salario_hora:   { type: number, format: float }
        salario_liquido: { type: number, format: float }
        salario_bruto:  { type: number, format: float }
        horas_extra:    { type: integer }
        numero_porta:   { type: string }
        rua:            { type: string }
        localidade:     { type: string }
        codigo_postal:  { type: string }

    FuncionarioResumido:
      type: object
      description: Versão reduzida devolvida a cargos não-Gerente
      properties:
        id:   { type: integer }
        nome: { type: string }

    CheckList:
      type: object
      properties:
        luzes:         { type: boolean }
        pneus:         { type: boolean }
        aceleracao:    { type: boolean }
        travagem:      { type: boolean }
        visor:         { type: boolean }
        teste_pratico: { type: boolean }

    Diagnostico:
      type: object
      properties:
        descricao:      { type: string }
        orcamento:      { type: number, format: float }
        pecasOrcamento:
          type: object
          additionalProperties: { type: integer }
          description: "Map<codPeca, quantidade>"
        cod_reparacoes:
          type: array
          items: { type: integer }
        aprovado: { type: boolean }

    Conserto:
      type: object
      properties:
        preco_total:
          type: number
          format: float
        stocksUsados:
          type: object
          additionalProperties: { type: integer }
          description: "Map<codStock, quantidade>"
        cod_reparacoes:
          type: array
          items: { type: integer }
        checkList: { $ref: '#/components/schemas/CheckList' }

    Pagamento:
      type: object
      properties:
        metodo:           { $ref: '#/components/schemas/MetodoPagamento' }
        dataPagamento:    { type: string, format: date-time }
        clienteNotificado: { type: boolean }
        dataNotificacao:  { type: string, format: date-time }

    Registo:
      type: object
      properties:
        descricao:    { type: string }
        dataCriacao:  { type: string, format: date-time }
        codTrotinete: { type: integer }
        codCliente:   { type: integer }
        codCriador:   { type: integer }
        acessorios:
          type: array
          items: { type: string }

    OrdemServico:
      type: object
      properties:
        id:          { type: integer }
        registo:     { $ref: '#/components/schemas/Registo' }
        codMecanico: { type: integer, nullable: true }
        estado:      { $ref: '#/components/schemas/EstadoOS' }
        diagnostico:
          allOf: [ { $ref: '#/components/schemas/Diagnostico' } ]
          nullable: true
        conserto:
          allOf: [ { $ref: '#/components/schemas/Conserto' } ]
          nullable: true
        pagamento:
          allOf: [ { $ref: '#/components/schemas/Pagamento' } ]
          nullable: true

    Reparacao:
      type: object
      properties:
        id:           { type: integer }
        nomenclatura: { type: string }
        descricao:    { type: string }
        preco:        { type: number, format: float }
        disponivel:   { type: boolean }

    Fornecedor:
      type: object
      properties:
        id:        { type: integer }
        nome:      { type: string }
        email:     { type: string }
        telemovel: { type: string }

    Peca:
      type: object
      properties:
        id:           { type: integer }
        referencia:   { type: string }
        marca:        { type: string }
        nome:         { type: string }
        descricao:    { type: string }
        stock_minimo: { type: integer }
        preco_venda:  { type: number, format: float }
        codFornecedor: { type: integer }
        ativa:        { type: boolean }
        garantia:     { type: integer, description: "Garantia em meses" }

    Stock:
      type: object
      properties:
        id:           { type: integer }
        preco_compra: { type: number, format: float }
        codPeca:      { type: integer }
        data_chegada: { type: string, format: date, nullable: true }
        quantidade:   { type: integer }
        estado:       { $ref: '#/components/schemas/EstadoStock' }
        garantia:     { type: string, format: date, nullable: true }

    Encomenda:
      type: object
      properties:
        id:           { type: integer }
        codFornecedor: { type: integer }
        data_criacao: { type: string, format: date, nullable: true }
        data_rececao: { type: string, format: date, nullable: true }
        data_envio:   { type: string, format: date, nullable: true }
        estado:       { $ref: '#/components/schemas/EstadoEncomenda' }
        codStocks:
          type: array
          items: { type: integer }

    Defeito:
      type: object
      properties:
        id:           { type: integer }
        codStock:     { type: integer }
        motivo:       { type: string }
        idFuncionario: { type: integer }
        estadoAnterior: { $ref: '#/components/schemas/EstadoStock' }

    Devolucao:
      type: object
      properties:
        id:       { type: integer }
        data:     { type: string, format: date }
        motivo:   { type: string }
        estado:   { $ref: '#/components/schemas/EstadoDevolucao' }
        codStock: { type: integer }

    Notificacao:
      type: object
      properties:
        id:              { type: integer }
        descricao:       { type: string }
        data_emissao:    { type: string, format: date-time }
        id_remetente:    { type: integer, nullable: true }
        id_destinatario: { type: integer }
        estado:          { $ref: '#/components/schemas/EstadoNotificacao' }
        data_horaTratada: { type: string, format: date-time, nullable: true }

    MovimentoFinanceiro:
      type: object
      properties:
        id:        { type: integer }
        valor:     { type: number, format: float }
        data:      { type: string, format: date-time }
        descricao: { type: string }
        tipo:      { $ref: '#/components/schemas/TipoMovimento' }

    AnaliseFinanceira:
      type: object
      properties:
        receitas:  { type: number, format: float }
        despesas:  { type: number, format: float }
        saldo:     { type: number, format: float }
        movimentos: { type: number, format: float }
        lista_tipos:
          type: array
          items:
            type: object
            properties:
              tipo:  { $ref: '#/components/schemas/TipoMovimento' }
              valor: { type: number, format: float }

    MovimentoFinanceiroResponse:
      type: object
      properties:
        movimentos:
          type: array
          items: { $ref: '#/components/schemas/MovimentoFinanceiro' }
        analise: { $ref: '#/components/schemas/AnaliseFinanceira' }

    # ── Request bodies ─────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [identificador, password]
      properties:
        identificador: { type: string }
        password:      { type: string, format: password }

    LoginResponse:
      type: object
      properties:
        token:        { type: string }
        cargo:        { $ref: '#/components/schemas/Cargo' }
        idFuncionario: { type: integer }
        idUtilizador: { type: integer }

    UserRequest:
      type: object
      required: [password, idFuncionario, cargo, identificador]
      properties:
        password:      { type: string, format: password }
        idFuncionario: { type: integer }
        cargo:         { $ref: '#/components/schemas/Cargo' }
        identificador: { type: string }

    PasswordChangeRequest:
      type: object
      required: [newPassword, currentPassword]
      properties:
        newPassword:     { type: string, format: password }
        currentPassword: { type: string, format: password }

    ClienteRequest:
      type: object
      required: [nome]
      properties:
        nome:      { type: string }
        email:     { type: string }
        telemovel: { type: string }
        nif:       { type: string }

    TrotineteRequest:
      type: object
      required: [marca, modelo, num_serie, motor]
      properties:
        cod_cliente: { type: integer }
        marca:       { type: string }
        modelo:      { type: string }
        num_serie:   { type: string }
        motor:       { type: string }

    FuncionarioRequest:
      type: object
      required: [nome, telemovel, email, NISS, NIF, NUS, IBAN, salario_hora, salario_liquido, salario_bruto, numero_porta, rua, localidade, codigo_postal]
      properties:
        nome:            { type: string }
        telemovel:       { type: string }
        email:           { type: string }
        data_nascimento: { type: string, format: date }
        NISS:            { type: string }
        NIF:             { type: string }
        NUS:             { type: string }
        IBAN:            { type: string }
        salario_hora:    { type: number, format: float }
        salario_liquido: { type: number, format: float }
        salario_bruto:   { type: number, format: float }
        horas_extra:     { type: integer }
        numero_porta:    { type: string }
        rua:             { type: string }
        localidade:      { type: string }
        codigo_postal:   { type: string }

    OrdemServicoRequest:
      type: object
      required: [id_cliente, id_trotinete]
      properties:
        id_cliente:    { type: integer }
        id_trotinete:  { type: integer }
        descricao:     { type: string }
        acessorios:
          type: array
          items: { type: string }

    PegarOSRequest:
      type: object
      required: [id_funcionario]
      properties:
        id_funcionario: { type: integer }

    DiagnosticoRequest:
      type: object
      required: [pecasQuantidades, reparacoes]
      properties:
        pecasQuantidades:
          type: object
          additionalProperties: { type: integer }
          description: "Map<codPeca, quantidade>"
        reparacoes:
          type: array
          items: { type: integer }
        descricao: { type: string }

    ConsertoRequest:
      type: object
      required: [pecasQuantidades, reparacoes, checklist]
      properties:
        pecasQuantidades:
          type: object
          additionalProperties: { type: integer }
          description: "Map<codStock, quantidade>"
        reparacoes:
          type: array
          items: { type: integer }
        checklist: { $ref: '#/components/schemas/CheckList' }

    PagamentoRequest:
      type: object
      required: [metodo_pagamento]
      properties:
        metodo_pagamento: { $ref: '#/components/schemas/MetodoPagamento' }

    ReparacaoRequest:
      type: object
      required: [nomenclatura, preco, disponivel]
      properties:
        nomenclatura: { type: string }
        descricao:    { type: string }
        preco:        { type: number, format: float }
        disponivel:   { type: boolean }

    FornecedorRequest:
      type: object
      required: [nome]
      properties:
        nome:      { type: string }
        telemovel: { type: string }
        email:     { type: string }

    PecaRequest:
      type: object
      required: [referencia, stock_minimo, preco_venda, codFornecedor, ativa, garantia]
      properties:
        referencia:   { type: string }
        marca:        { type: string }
        nome:         { type: string }
        descricao:    { type: string }
        stock_minimo: { type: integer }
        preco_venda:  { type: number, format: float }
        codFornecedor: { type: integer }
        ativa:        { type: boolean }
        garantia:     { type: integer, description: "Garantia em meses" }

    StockRequest:
      type: object
      required: [codPeca, preco, quantidade]
      properties:
        codPeca:     { type: integer }
        preco:       { type: number, format: float }
        quantidade:  { type: integer }
        dataChegada: { type: string, format: date }

    ItemEncomendaRequest:
      type: object
      required: [codPeca, quantidade, preco_compra]
      properties:
        codPeca:     { type: integer }
        quantidade:  { type: integer }
        preco_compra: { type: number, format: float }

    EncomendaRequest:
      type: object
      required: [cod_fornecedor, itens]
      properties:
        cod_fornecedor: { type: integer }
        itens:
          type: array
          items: { $ref: '#/components/schemas/ItemEncomendaRequest' }

    DefeitoRequest:
      type: object
      required: [codPeca, motivo, idFuncionario]
      properties:
        codPeca:      { type: integer }
        motivo:       { type: string }
        idFuncionario: { type: integer }

    DefeitoToDevolucaoRequest:
      type: object
      required: [motivo, data]
      properties:
        motivo: { type: string }
        data:   { type: string, format: date }

    SplitDefeitoRequest:
      type: object
      required: [quantidade, motivo, data]
      properties:
        quantidade: { type: integer }
        motivo:     { type: string }
        data:       { type: string, format: date }

    ErrorResponse:
      type: object
      properties:
        status:    { type: integer }
        erro:      { type: string }
        mensagem:  { type: string }

# ─────────────────────────────────────────────────────────────────────────────
# Global security (sobreposto por rotas públicas)
# ─────────────────────────────────────────────────────────────────────────────
security:
  - tokenAuth: []

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Root ────────────────────────────────────────────────────────────────────
  /:
    get:
      tags: [Auth]
      summary: Health-check raiz
      security: []
      responses:
        '200':
          description: Mensagem de boas-vindas
          content:
            text/plain:
              schema: { type: string, example: "Bem-vindo ao IecoRideCA API!" }

  # ── Auth ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sessão
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Sessão criada com sucesso
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Terminar sessão
      responses:
        '204':
          description: Sessão terminada

  # ── Utilizadores ────────────────────────────────────────────────────────────
  /api/utilizadores:
    get:
      tags: [Utilizadores]
      summary: Listar todos os utilizadores
      description: "Cargo: Gerente"
      responses:
        '200':
          description: Lista de utilizadores
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Utilizador' }
    post:
      tags: [Utilizadores]
      summary: Criar utilizador
      description: "Cargo: Gerente"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserRequest' }
      responses:
        '201':
          description: Utilizador criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Utilizador' }
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/utilizadores/{id}:
    delete:
      tags: [Utilizadores]
      summary: Remover utilizador
      description: "Cargo: Gerente"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Removido
        '404':
          description: Não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Utilizadores]
      summary: Atualizar utilizador
      description: "Cargo: Gerente"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserRequest' }
      responses:
        '200':
          description: Utilizador atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Utilizador' }

  /api/utilizadores/por-funcionario/{idFuncionario}:
    get:
      tags: [Utilizadores]
      summary: Obter idUtilizador pelo idFuncionario
      description: "Cargo: Gerente, Mecanico, Secretaria, GestorStock"
      parameters:
        - name: idFuncionario
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: ID do utilizador
          content:
            application/json:
              schema:
                type: object
                properties:
                  idUtilizador: { type: integer }

  /api/utilizadores/{id}/password:
    patch:
      tags: [Utilizadores]
      summary: Alterar password
      description: "Autorizado: próprio utilizador ou Gerente"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordChangeRequest' }
      responses:
        '204':
          description: Password alterada
        '401':
          description: Password actual incorrecta
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Sem permissão
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Funcionários ────────────────────────────────────────────────────────────
  /api/funcionarios:
    get:
      tags: [Funcionários]
      summary: Listar funcionários
      description: |
        Gerente recebe dados completos.
        Outros cargos recebem apenas `{id, nome}`.
      responses:
        '200':
          description: Lista de funcionários
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { $ref: '#/components/schemas/Funcionario' }
                  - type: array
                    items: { $ref: '#/components/schemas/FuncionarioResumido' }
    post:
      tags: [Funcionários]
      summary: Criar funcionário
      description: "Cargo: Gerente"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FuncionarioRequest' }
      responses:
        '201':
          description: Funcionário criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Funcionario' }

  /api/funcionarios/{id}:
    get:
      tags: [Funcionários]
      summary: Obter funcionário por ID
      description: "Cargo: Gerente (dados completos), outros cargos ({id, nome})"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Funcionário
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: '#/components/schemas/Funcionario' }
                  - { $ref: '#/components/schemas/FuncionarioResumido' }
        '404':
          description: Não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    delete:
      tags: [Funcionários]
      summary: Remover funcionário
      description: "Cargo: Gerente"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Removido
        '404':
          description: Não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Funcionários]
      summary: Atualizar funcionário
      description: "Cargo: Gerente"
      parameters:
