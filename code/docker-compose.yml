services:

  # ── Base de dados ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: EcoRide
      MYSQL_USER: ecoride
      MYSQL_PASSWORD: EcoRide123!
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysql", "-uecoride", "-pEcoRide123!", "-e", "USE EcoRide;"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── API de dados (Javalin) ──────────────────────────────────────────────────
  backend:
    build: ./app
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: EcoRide
      DB_USER: ecoride
      DB_PASS: EcoRide123!
      DEV_MODE: "false"   # remover em produção
      ENCRYPTION_KEY: "gJ0uE98qhXW39ZLMVzrEM8/DlrZdGNKxnzRPvZk7nnE="  # remover em produção
    ports:
      - "7000:7000"   # exposto para testes directos à API
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/7000' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  # ── Interface (React + nginx) ───────────────────────────────────────────────
  frontend:
    build: ./EcoRideCA
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Swagger UI ─────────────────────────────────────────────────────────────
  # O ficheiro openapi.yaml é servido pelo nginx do frontend em /api-docs.
  # Garante que o nginx.conf do frontend tem a location /api-docs configurada
  # e serve o ficheiro openapi.yaml com o header Content-Type correcto.
  swagger:
    image: swaggerapi/swagger-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON_URL: http://localhost:3000/api-docs 
    depends_on:
      - backend

  # ── Info ───────────────────────────────────────────────────────────────────
  # Serviço de curta duração que imprime os links no terminal após o arranque.
  info:
    image: alpine
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      swagger:
        condition: service_started
    command: >
      sh -c "
        echo '' &&
        echo '┌─────────────────────────────────────────┐' &&
        echo '│           EcoRide — a correr            │' &&
        echo '├─────────────────────────────────────────┤' &&
        echo '│  Interface    →  http://localhost:3000  │' &&
        echo '│  API directa  →  http://localhost:7000  │' &&
        echo '│  Swagger UI   →  http://localhost:8081  │' &&
        echo '└─────────────────────────────────────────┘' &&
        echo ''
      "

volumes:
  mysql_data: