server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para a API de dados
    location /api/ {
        proxy_pass         http://backend:7000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Proxy para autenticação
    location /auth/ {
        proxy_pass         http://backend:7000/auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Swagger spec — serve o openapi.yaml em /api-docs
    location = /api-docs {
        alias /usr/share/nginx/html/openapi.yaml;
        add_header Content-Type "application/yaml; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
    }

    # Fallback SPA — todas as rotas servem o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
